spring.application.name=gateway-service
server.port=8080

# -------------------------------
# ? DISABLE SERVICE DISCOVERY
# -------------------------------
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
spring.cloud.discovery.enabled=false

# ? IMPORTANT: correct new key (fixes your crash)
spring.cloud.gateway.server.webflux.discovery.locator.enabled=false

# -------------------------------
# ? GLOBAL CORS (ONLY HERE)
# -------------------------------
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:5173
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedMethods=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowCredentials=true

# -------------------------------
# ? ROUTES
# -------------------------------

# AUTH SERVICE
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**
# (optional if your controller uses /login instead of /api/auth/login)
# spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=2

# USER SERVICE
spring.cloud.gateway.server.webflux.routes[1].id=user-service
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8082
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/user/**,/api/admin/**

# DOCUMENT SERVICE
spring.cloud.gateway.server.webflux.routes[2].id=document-service
spring.cloud.gateway.server.webflux.routes[2].uri=http://localhost:8083
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/documents/**

# TEAM SERVICE
spring.cloud.gateway.server.webflux.routes[3].id=team-service
spring.cloud.gateway.server.webflux.routes[3].uri=http://localhost:8084
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/teams/**

# -------------------------------
# ? JWT CONFIG
# -------------------------------
spring.security.oauth2.resourceserver.jwt.public-key-location=classpath:keys/public.pem