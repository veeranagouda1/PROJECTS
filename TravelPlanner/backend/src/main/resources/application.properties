spring.application.name=backend

# ===============================
# PostgreSQL Database Config
# ===============================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/travel_db}
spring.datasource.username=${DB_USERNAME:travel_user}
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# Server
# ===============================
server.port=8080

# ===============================
# JWT Configuration
# ===============================
jwt.secret=${JWT_SECRET:CHANGE_ME}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===============================
# AI Configuration (Google Gemini)
# ===============================
ai.api.key=${AI_API_KEY}
ai.model=${AI_MODEL:gemini-2.5-flash}

# ===============================
# Google API Configuration
# ===============================
google.api.key=${GOOGLE_API_KEY}

# ===============================
# Email Configuration
# ===============================
spring.mail.enabled=true
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=${MAIL_FROM}

# ===============================
# Twilio SMS Configuration
# ===============================
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.phone-number=${TWILIO_PHONE_NUMBER}

# ===============================
# Google OAuth2 Configuration
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_OAUTH_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
spring.security.oauth2.client.provider.google.user-name-attribute=sub
